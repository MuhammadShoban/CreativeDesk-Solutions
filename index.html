    <!-- =========================================
         PERFORMANCE: Critical Resource Hints
         ========================================= -->

    <!-- Preconnect to font origins FIRST (reduces DNS + TLS handshake time) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload the font stylesheet to initiate fetch immediately -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    />

    <!-- 
      Load Google Fonts with display=swap to avoid FOIT (Flash of Invisible Text)
      and prevent layout shifts caused by font swapping.
      Using &display=swap is critical for CLS score.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback for no-JS -->
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>


    <!-- Critical inline CSS: font-face fallbacks to prevent CLS before webfonts load -->
    <style>
      /* System font stack while web fonts load — prevents layout shift */
      html { font-size: 16px; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      /* Prevent FOUC on root */
      #root { min-height: 100vh; }

      /* Critical above-the-fold: prevent CLS by sizing font-faces early */
      @font-face {
        font-family: 'Plus Jakarta Sans';
        font-style: normal;
        font-weight: 400 800;
        font-display: swap;
        src: local('Plus Jakarta Sans');
        size-adjust: 102%;
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: local('Inter');
      }
    </style>
